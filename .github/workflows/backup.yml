name: Notion-to-Obsidian

on:
  # Every Sunday at 03:00 UTC — that's ~04:00 or 05:00 Malta time depending on DST.
  # Pick any cron schedule you want: https://crontab.guru
  schedule:
    - cron: '0 3 * * 0'
  # Also allow manual runs from the Actions tab (we'll use this in a moment to test).
  workflow_dispatch:

permissions:
  # The robot needs permission to commit and push the backup files back into the repo.
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install notion-client

      - name: Run backup
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}   # <-- the secret you added
        run: python backup.py

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backup/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Notion backup $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
